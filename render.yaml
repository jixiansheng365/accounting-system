services:
  - type: web
    name: accounting-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:10000 "app:create_app('production')"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///data/accounting.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
