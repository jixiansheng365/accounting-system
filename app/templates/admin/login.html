<!DOCTYPE html>
<html lang="{{ session.get('lang', 'zh_CN') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0b5ed7;
            --primary-light: #cfe2ff;
            --gray-50: #f8f9fa;
            --gray-100: #f1f3f4;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --success: #28a745;
            --danger: #dc3545;
            --radius: 12px;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 15px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .admin-login-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: 600px;
        }

        /* 左侧品牌区域 - 深色侧边栏风格 */
        .login-brand {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: rgba(13, 110, 253, 0.2);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 40px;
            border: 2px solid rgba(13, 110, 253, 0.3);
        }

        .brand-logo i {
            color: #0d6efd;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .brand-subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .brand-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(13, 110, 253, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #0d6efd;
        }

        /* 右侧表单区域 */
        .login-form-wrapper {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--gray-600);
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .admin-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-control::placeholder {
            color: var(--gray-500);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--gray-600);
            cursor: pointer;
        }

        .form-check input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .forgot-password {
            font-size: 14px;
            color: var(--primary);
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            height: 48px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(13, 110, 253, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-loading {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-danger {
            background: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 4px 8px;
            font-size: 12px;
            color: var(--gray-600);
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .lang-btn:hover,
        .lang-btn.active {
            background: var(--gray-100);
            color: var(--gray-900);
        }

        .login-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
            text-align: center;
            font-size: 13px;
            color: var(--gray-600);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--gray-600);
            text-decoration: none;
            margin-bottom: 16px;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* 返回按钮 */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-back:hover {
            background: var(--gray-200);
            color: var(--gray-900);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .admin-login-container {
                grid-template-columns: 1fr;
            }

            .login-brand {
                display: none;
            }

            .login-form-wrapper {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <!-- 左侧品牌区域 -->
        <div class="login-brand">
            <div class="brand-logo">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="brand-title">管理后台</h1>
            <p class="brand-subtitle">高效管理您的代理记账系统。访问客户数据、上传报表并监控系统活动。</p>
            <div class="brand-features">
                <div class="brand-feature">
                    <div class="feature-icon">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <span>客户管理</span>
                </div>
                <div class="brand-feature">
                    <div class="feature-icon">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span>报表分析</span>
                </div>
                <div class="brand-feature">
                    <div class="feature-icon">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <span>安全访问</span>
                </div>
            </div>
        </div>

        <!-- 右侧表单区域 -->
        <div class="login-form-wrapper" style="position: relative;">
            <!-- 语言选择 -->
            <div class="language-selector">
                <a href="?lang=zh_CN" class="lang-btn {% if session.get('lang') == 'zh_CN' or not session.get('lang') %}active{% endif %}">简</a>
                <a href="?lang=zh_TW" class="lang-btn {% if session.get('lang') == 'zh_TW' %}active{% endif %}">繁</a>
                <a href="?lang=ja" class="lang-btn {% if session.get('lang') == 'ja' %}active{% endif %}">日</a>
                <a href="?lang=ko" class="lang-btn {% if session.get('lang') == 'ko' %}active{% endif %}">韩</a>
                <a href="?lang=en" class="lang-btn {% if session.get('lang') == 'en' %}active{% endif %}">EN</a>
            </div>

            <!-- 返回按钮 -->
            <a href="{{ url_for('main.index') }}" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i>
                返回首页
            </a>

            <div class="login-header">
                <span class="admin-badge">管理员</span>
                <h2>欢迎回来</h2>
                <p>请登录以访问管理后台</p>
            </div>

            <!-- 错误提示 -->
            <div class="alert alert-danger" id="errorAlert"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fa-solid fa-user me-2 text-muted"></i>用户名
                    </label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fa-solid fa-lock me-2 text-muted"></i>密码
                    </label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                </div>

                <div class="form-options">
                    <label class="form-check">
                        <input type="checkbox" name="remember" id="remember">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">
                        <i class="fa-solid fa-right-to-bracket me-2"></i>登录
                    </span>
                    <span class="btn-loading" style="display: none;"></span>
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 {{ app_name }} - 管理后台</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#adminLoginForm').on('submit', function(e) {
                e.preventDefault();
                
                var $btn = $('#loginBtn');
                var $error = $('#errorAlert');
                
                $error.hide();
                $btn.find('.btn-text').hide();
                $btn.find('.btn-loading').show();
                $btn.prop('disabled', true);
                
                $.ajax({
                    url: '{{ url_for("admin.login") }}',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: $('#username').val(),
                        password: $('#password').val(),
                        remember: $('#remember').is(':checked')
                    }),
                    success: function(response) {
                        if (response.success) {
                            window.location.href = '{{ url_for("admin.dashboard") }}';
                        } else {
                            $error.text(response.message).show();
                        }
                    },
                    error: function(xhr) {
                        var message = '登录失败，请重试';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            message = xhr.responseJSON.message;
                        }
                        $error.text(message).show();
                    },
                    complete: function() {
                        $btn.find('.btn-text').show();
                        $btn.find('.btn-loading').hide();
                        $btn.prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
